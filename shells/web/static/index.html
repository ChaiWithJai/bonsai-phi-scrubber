<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16120e">
<title>Airplane Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e7e3d8; --paper:#f5f1e8; --card:#fcfaf4; --ink:#221f19; --mut:#6b6456;
    --line:#ece4d4; --gold:#b87814; --gold2:#c6912f; --green:#1f7a4d; --green2:#4fd08c;
    --red:#bf3b2b; --amber:#8a5a0f;
    --sans:'Hanken Grotesk',-apple-system,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  @keyframes sweep{0%{top:-12%;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:104%;opacity:0}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  @keyframes flow{to{background-position:18px 0}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(54,194,129,0)}50%{box-shadow:0 0 30px 1px rgba(54,194,129,.4)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{opacity:0;transform:translateY(6px) scale(.96)}100%{opacity:1;transform:none}}

  /* device: FULL-BLEED on real phones (the phone is the frame); a device frame only
     on desktop pointers. */
  #phone{position:relative;width:100vw;height:100vh;height:100dvh;background:var(--paper);
    display:flex;flex-direction:column;overflow:hidden;
    padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
  #notch{display:none;position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:150px;height:26px;background:#0c0b09;border-radius:0 0 20px 20px;z-index:30}
  @media (min-width:600px) and (pointer:fine){
    #phone{width:400px;height:780px;max-height:94vh;border-radius:46px;padding:0;
      box-shadow:0 40px 80px -30px rgba(35,25,10,.6), inset 0 0 0 2px rgba(255,255,255,.06), 0 0 0 11px #1c1813}
    #notch{display:block}
  }
  .dark{background:var(--paper)}
  #phone.dark{background:radial-gradient(120% 80% at 50% 0%,#1a1712,#0e0c0a)}
  #phone.dark.green{background:radial-gradient(120% 75% at 50% 100%,#12231a,#0a0d0b)}

  .screen{flex:1;min-height:0;display:flex;flex-direction:column;padding:20px 24px 24px;overflow:hidden;animation:pop .35s ease}

  h1{font:800 40px/.97 var(--sans);letter-spacing:-.03em;margin:0}
  .kicker{font:500 12px/1 var(--mono);letter-spacing:.07em;color:#a39a86}
  .sub{font:400 14px/1.5 var(--sans);color:var(--mut)}
  .btn{background:var(--ink);color:var(--paper);font:700 15px var(--sans);padding:16px;border-radius:15px;
    text-align:center;border:none;width:100%;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .toggle{display:flex;align-items:center;justify-content:space-between;border:1.5px solid #e6dfd0;
    background:var(--card);border-radius:15px;padding:12px 14px;cursor:pointer}
  .sw{width:44px;height:26px;border-radius:13px;position:relative;transition:background .25s}
  .sw b{position:absolute;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;
    box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .25s,right .25s}
  .sw.on{background:var(--gold)} .sw.on b{right:3px} .sw.off{background:#2f6f4c} .sw.off b{left:3px}
  .note{background:var(--card);border:1.5px solid #ece4d4;border-radius:16px;padding:16px;
    font:400 14.5px/1.65 var(--sans);color:#3a352c;flex:1;min-height:0;overflow:auto;width:100%;resize:none;outline:none}
  .chip{font:600 11px var(--sans);color:#3a352c;background:#efe9da;border-radius:8px;padding:5px 9px;display:inline-block}
  .pill{font:600 9px/1 var(--mono);border-radius:20px;padding:4px 8px;display:inline-flex;align-items:center;gap:4px}
  .code{font:500 10.5px/1.55 var(--mono);white-space:pre-wrap;word-break:break-word;color:#4f493f;background:#f7f1e5;border:1px solid var(--line);border-radius:10px;padding:10px}
  .mono{font-family:var(--mono)}
  .grow{flex:1;min-height:0}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  /* dark proof-beat bits */
  .dbox{background:rgba(255,255,255,.02);border:1px solid #2a2620;border-radius:16px;min-height:0}
  .swband{position:absolute;left:0;right:0;height:34px;border-bottom:1.5px solid rgba(54,194,129,.65);
    background:linear-gradient(180deg,rgba(54,194,129,0),rgba(54,194,129,.16) 60%,rgba(54,194,129,.42));
    animation:sweep 2.4s cubic-bezier(.5,0,.5,1) infinite;z-index:2}
  /* slack overlay */
  #slack{position:absolute;inset:0;background:rgba(20,14,6,.55);z-index:40;display:none;
    align-items:center;justify-content:center;padding:18px;animation:pop .3s ease}
  .scard{background:#fff;border-radius:16px;overflow:hidden;width:100%;max-width:380px;
    box-shadow:0 34px 60px -28px rgba(40,30,10,.5);border:1px solid #e2dac9}
</style>
</head>
<body>
<div id="phone">
  <div id="notch"></div>
  <div id="screen" class="screen"></div>
</div>

<div id="slack"><div class="scard" id="scard"></div></div>

<script>
const NOTE = "Met with Maria Alvarez (CM-204815) at her place Tuesday. She's the one whose daughter just started college. Committed to a 10-min morning walk daily.";
const S = { airplane:true, screen:'capturing', note:'', result:null, error:null, posted:false, sendNote:'', packDemo:null, packError:null };

const $phone = document.getElementById('phone');
const $screen = document.getElementById('screen');
const $slack = document.getElementById('slack');
const $scard = document.getElementById('scard');

// real time for the Slack message preview (this runs in the phone's browser)
function clock(ampm){
  const d=new Date(); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0');
  const ap=h<12?'AM':'PM'; h=h%12||12;
  return ampm ? `${h}:${m} ${ap}` : `${h}:${m}`;
}

function toggleHTML(label, dark){
  const cls = S.airplane ? 'on' : 'off';
  const col = dark ? '#cfd6cd' : '#221f19';
  const icon = dark ? '#8c8475' : '#b87814';
  return `<div class="toggle" data-act="toggle" style="${dark?'background:rgba(255,255,255,.02);border-color:#243029':''}">
    <span style="display:flex;align-items:center;gap:10px"><span style="color:${icon};font-size:15px">✈</span>
    <span style="font:600 13px var(--sans);color:${col}">${label}</span></span>
    <span class="sw ${cls}"><b></b></span></div>`;
}

// ---------- screens ----------
const screens = {
 capturing(){ setDark(false); return `
   <div style="display:flex;align-items:center;gap:9px;margin-top:4px">
     <div style="width:26px;height:26px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-size:13px">✈</div>
     <div style="font:700 15px var(--sans);letter-spacing:-.01em">New session</div>
     <span class="pill" style="margin-left:auto;color:var(--amber);background:#f6ecd6;border:1px solid #e3c98a">✈ offline</span></div>
   <div class="sub" style="margin-top:11px;font-size:13px">Speak or type the session note. Dictation runs <b style="color:var(--ink)">on your device</b> — tap the field, then the&nbsp;🎤&nbsp;on your keyboard.</div>
   <textarea class="note" style="margin-top:12px" placeholder="Tap here, then dictate or type the session…" oninput="S.note=this.value">${esc(S.note)}</textarea>
   <div style="display:flex;align-items:center;justify-content:space-between;margin-top:11px">
     <span data-act="sample" style="font:600 12px var(--sans);color:var(--gold);cursor:pointer;border-bottom:1px solid #e3c98a">Use a sample note</span>
     <span class="mono" style="font-size:10px;color:#8a8273">raw text stays on device</span></div>
   <div class="grow"></div>
   <button class="btn" data-act="scrub">Scrub on device</button>`; },

 scrubbing(){ setDark(true,false);
   // error state
   if(S.error){ return `
     <div style="font:700 18px var(--sans);color:#f3eee2">Couldn't scrub</div>
     <div class="dbox" style="margin-top:15px;padding:16px;border-color:#5c2e27;color:#cdb1a8;font:400 13.5px/1.6 var(--sans)">
       ${esc(S.error)}
       <div class="mono" style="font-size:11px;color:#8c8475;margin-top:12px">The model server must be running on the laptop:<br>./scripts/serve-model.sh</div></div>
     <div class="grow"></div>
     <button class="btn" data-act="retry" style="background:var(--red);margin-bottom:12px">Try again</button>
     <span data-act="back" class="mono" style="font-size:12px;color:#8c8475;text-align:center;cursor:pointer">← back to the note</span>`; }
   const r = S.result;
   // loading state — the REAL note, under the sweep
   if(!r){ return `
     <div style="font:700 18px var(--sans);color:#f3eee2;letter-spacing:-.01em">Scrubbing</div>
     <div style="display:flex;align-items:center;gap:8px;margin-top:9px">
       <span class="mono" style="font-size:11px;color:#8c8475">rules ∪ Bonsai 1.7B</span>
       <span class="pill" style="color:#9bd9b3;border:1px solid #2c4a38;background:rgba(54,194,129,.08)">ON-DEVICE</span></div>
     <div class="dbox" style="position:relative;flex:1;margin-top:15px;padding:16px;overflow:hidden;font:400 14px/1.8 var(--sans);color:#6f685b">
       <div class="swband"></div>${esc(S.note)}</div>
     <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;border-top:1px solid #2a2620;padding-top:14px">
       <span class="mono" style="font-size:11px;color:#8c8475">running locally · a few seconds</span>
       <span class="mono" style="font-size:11px;color:#d09a3a;display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#d09a3a;animation:blink 1s infinite"></span>working</span></div>`; }
   // result — the REAL scrubbed text + the categories caught
   const ents=[...new Set(r.redactions.map(x=>x.entity))];
   return `
   <div style="font:700 18px var(--sans);color:#f3eee2;letter-spacing:-.01em">Caught ${r.redactions.length}</div>
   <div class="mono" style="font-size:11px;color:#8c8475;margin-top:9px">rules ∪ Bonsai 1.7B · on device</div>
   <div class="dbox" style="flex:1;margin-top:15px;padding:16px;overflow:auto;font:400 14px/1.9 var(--sans);color:#cfc7b6">${esc(r.scrubbed_text)}</div>
   <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">
     ${ents.slice(0,6).map(e=>`<span style="font:700 9px var(--mono);color:#f3927f;background:rgba(191,59,43,.16);border:1px solid #5c2e27;border-radius:5px;padding:4px 7px">${esc(e)}</span>`).join('')}</div>
   <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:14px;border-top:1px solid #2a2620;padding-top:14px">
     <span class="mono" style="font-size:12px;color:#5fe09a;cursor:pointer" data-act="gate">continue →</span></div>`; },

 gated(){ setDark(true,true);
   const r=S.result; const pass = r.gate_pass; const resid = r.residual_count;
   const ents=[...new Set(r.redactions.map(x=>x.entity))].slice(0,5);
   return `
   <div style="font:700 18px var(--sans);color:#eef4ee;letter-spacing:-.01em">Verifier gate</div>
   <div class="mono" style="font-size:11px;color:#7e8a80;margin-top:9px;letter-spacing:.02em">re-scan · default-deny egress</div>
   <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px" class="mono">
     ${ents.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#bfc8be">
        <span>${esc(e)}</span><span style="color:#4fd08c;display:flex;align-items:center;gap:6px">removed
        <span style="display:inline-flex;width:15px;height:15px;border-radius:50%;background:rgba(79,208,140,.16);align-items:center;justify-content:center;font-size:9px">✓</span></span></div>`).join('')}
   </div>
   <div class="dbox" style="margin-top:18px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:9px;border-color:#1e3026">
     <div class="mono" style="font-size:10px;color:#7e8a80;letter-spacing:.1em">RESIDUAL IDENTIFIERS</div>
     <div class="mono" style="font:700 56px/.9 var(--mono);color:${pass?'#4fd08c':'#f3927f'}">${resid}</div>
     <div style="width:100%;height:8px;background:#16201a;border-radius:5px;overflow:hidden;border:1px solid #21342a">
       <div style="width:100%;height:100%;background:linear-gradient(90deg,${pass?'#1f7a4d,#4fd08c':'#7a1f1f,#d04f4f'})"></div></div>
   </div>
   <div class="grow"></div>
   <div data-act="record" style="border:1.5px solid ${pass?'#2f6f4c':'#5c2e27'};background:rgba(54,194,129,.10);border-radius:14px;padding:14px;text-align:center;cursor:pointer;${pass?'animation:glow 2.4s ease-in-out infinite':''}">
     <div style="font:700 15px var(--sans);color:${pass?'#5fe09a':'#f3927f'};letter-spacing:.01em">${pass?'EGRESS UNLOCKED':'EGRESS BLOCKED'}</div>
     <div class="mono" style="font-size:10px;color:#8fb6a0;margin-top:6px">0 residual or no egress · Const. IX</div>
   </div>`; },

 record(){ setDark(false);
   const rec=S.result.record;
   const themes=(rec.themes||[]);
   const coms=(rec.commitments||[]);
   const sendLabel = S.airplane ? 'Send to #coach-records' : 'Send to #coach-records';
   return `
   <div style="display:flex;align-items:center;justify-content:space-between">
     <div style="font:700 17px var(--sans);letter-spacing:-.01em">Care record</div>
     <span class="pill" style="color:var(--green);background:#e6f0e7;border:1px solid #bfdcc6">✓ CLEAN</span></div>
   <div style="flex:1;min-height:0;margin-top:14px;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;overflow:auto">
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">CLIENT_PSEUDONYM</div>
     <div class="mono" style="font:700 19px var(--mono);margin-top:6px">${esc(rec.client_pseudonym||'CLIENT-—')}</div>
     ${themes.length ? `<div style="height:1px;background:var(--line);margin:14px 0"></div>
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">THEMES</div>
     <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${themes.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>` : ''}
     <div style="height:1px;background:var(--line);margin:14px 0"></div>
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">COMMITMENTS</div>
     ${coms.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:9px">
        <span style="font:500 13px var(--sans)">${esc(c.text||c)}</span>
        <span class="mono" style="font-size:9px;font-weight:700;color:var(--amber);background:#f6ecd6;border-radius:5px;padding:3px 7px">${esc((c.status||'open').toUpperCase())}</span></div>`).join('')||'<div class="sub" style="margin-top:8px">—</div>'}
     <div style="height:1px;background:var(--line);margin:13px 0"></div>
     <div style="display:flex;gap:18px">
       <div><div class="mono" style="font-size:10px;color:#a39a86">RISK_FLAGS</div><div style="font:600 13px var(--sans);color:#5b8068;margin-top:6px">none</div></div>
       <div><div class="mono" style="font-size:10px;color:#a39a86">NEXT_TOUCH</div><div class="mono" style="font:600 13px var(--mono);margin-top:6px">${esc(rec.next_touch||'—')}</div></div>
     </div>
   </div>
   <div class="mono" style="display:flex;align-items:center;gap:7px;margin-top:12px;font-size:11px;font-weight:600;color:var(--amber)">
     <span style="font-size:13px">✈</span>${S.airplane?'still offline · not yet sent':'online'}</div>
   <button class="btn" data-act="send" style="margin-top:11px">${sendLabel}</button>`; },

 held(){ setDark(false); return `
   <div style="font:700 17px var(--sans);letter-spacing:-.01em">Sending…</div>
   <div style="margin-top:16px;background:#fbf2dd;border:1.5px solid #e3c98a;border-radius:16px;padding:15px;display:flex;gap:12px;align-items:flex-start">
     <div style="width:30px;height:30px;flex:none;border-radius:9px;background:#f3e2bd;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:16px">✈</div>
     <div><div style="font:700 14px var(--sans);color:var(--amber)">No network — radios off</div>
       <div style="font:400 12.5px/1.5 var(--sans);color:#9a7a3a;margin-top:4px">Nothing leaves the device. The clean record is held until you reconnect.</div></div></div>
   <div style="margin-top:16px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px">
     <div style="display:flex;align-items:center;justify-content:space-between">
       <span class="mono" style="font-size:12px;font-weight:600;color:#736c5d;letter-spacing:.03em">OUTBOX</span>
       <span class="mono" style="font-size:10px;font-weight:700;color:var(--amber);background:#f6ecd6;border:1px solid #e3c98a;border-radius:20px;padding:4px 9px">QUEUED · 1</span></div>
     <div style="display:flex;align-items:center;gap:11px;margin-top:13px">
       <div class="mono" style="width:34px;height:34px;flex:none;border-radius:9px;background:#efe9da;display:flex;align-items:center;justify-content:center;font:700 12px var(--mono);color:#736c5d">${esc((S.result.record.client_pseudonym||'7F3A').slice(-2))}</div>
       <div style="flex:1"><div style="font:600 13px var(--sans)">${esc(S.result.record.client_pseudonym||'CLIENT')} · care record</div>
         <div class="mono" style="font-size:11px;color:#a39a86;margin-top:3px">clean · awaiting network</div></div>
       <span style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></span></div></div>
   <div class="grow" style="display:flex;align-items:flex-end">
     <div style="font:600 16px/1.35 var(--sans);letter-spacing:-.01em">It refuses to send.<br><span style="color:var(--amber)">Good — that's the proof.</span></div></div>
   ${toggleHTML('Airplane mode — turn off to send', false)}`; },

 flush(){ setDark(true,true); return `
   <div style="font:700 18px var(--sans);color:#eef4ee;letter-spacing:-.01em">Connectivity restored</div>
   ${ '' }
   <div style="display:flex;align-items:center;justify-content:space-between;border:1px solid #243029;background:rgba(255,255,255,.02);border-radius:14px;padding:12px 14px;margin-top:15px">
     <div style="display:flex;align-items:center;gap:10px"><span style="color:#8c8475;font-size:15px">✈</span><span style="font:600 13px var(--sans);color:#cfd6cd">Airplane mode</span></div>
     <span class="sw off"><b></b></span></div>
   <div class="grow center" style="gap:20px">
     <div style="position:relative;width:78px;height:78px;display:flex;align-items:center;justify-content:center">
       <div style="position:absolute;inset:0;border-radius:50%;border:3px solid #1b2c22"></div>
       <div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#4fd08c;border-right-color:#4fd08c;animation:spin 1.1s linear infinite"></div>
       <div class="mono" style="font:700 22px var(--mono);color:#5fe09a">1/1</div></div>
     <div><div style="font:600 14px var(--sans);color:#dfe6df">Queue flushing</div>
       <div class="mono" style="font-size:11px;color:#7e8a80;margin-top:5px;text-align:center">posting clean record → #coach-records</div></div>
     <div style="width:80%;height:7px;background:#16201a;border-radius:5px;overflow:hidden;border:1px solid #21342a">
       <div style="width:72%;height:100%;background:linear-gradient(90deg,#1f7a4d,#4fd08c);background-size:18px 18px;animation:flow .7s linear infinite"></div></div></div>
   <div style="font:600 16px/1.35 var(--sans);color:#dfe6df;letter-spacing:-.01em">Now — and only now —<br><span style="color:#5fe09a">the clean record posts.</span></div>`; },

 delivered(){ setDark(false);
   const r=S.result; const rec=r.record;
   return `
   <div class="grow center" style="gap:18px">
     <div style="width:62px;height:62px;border-radius:50%;background:${S.posted?'var(--green)':'#e3c98a'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 14px 30px -10px rgba(31,122,77,.4)">${S.posted?'✓':'✈'}</div>
     <div><h1 style="font-size:30px">${S.posted?'Posted':'Held'}</h1>
       <div class="sub" style="margin-top:8px">${S.posted?'Clean record landed in<br><span class="mono" style="font-weight:700;color:var(--ink)">#coach-records</span>':esc(S.sendNote||'Set SLACK_WEBHOOK_URL to post for real')}</div></div></div>
   <div style="background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:9px" class="mono">
     <div style="display:flex;justify-content:space-between;font-size:12px;color:#736c5d"><span>record</span><span style="color:var(--ink)">${esc(rec.client_pseudonym||'CLIENT')}</span></div>
     <div style="display:flex;justify-content:space-between;font-size:12px;color:#736c5d"><span>identifiers sent</span><span style="color:var(--green);font-weight:700">0</span></div>
     <div style="display:flex;justify-content:space-between;font-size:12px;color:#736c5d"><span>raw note left the edge</span><span style="color:var(--green);font-weight:700">never</span></div></div>
   <div style="font:600 15px/1.4 var(--sans);margin-top:14px;letter-spacing:-.01em">The real name never reached the cloud. Only this did.</div>
   <div style="display:flex;gap:9px;margin-top:12px">
     <button class="btn" data-act="slack" style="background:#3a1f3a;padding:14px">View Slack</button>
     <button class="btn" data-act="pack" style="background:var(--ink);padding:14px">Pack reveal</button>
   </div>`; },

 pack(){ setDark(false);
   if(S.packError){ return `
     <div style="font:700 17px var(--sans)">Pack reveal</div>
     <div style="margin-top:14px;background:#fff1ed;border:1.5px solid #e5b2a8;border-radius:16px;padding:15px;color:#884035;font:500 13px/1.55 var(--sans)">${esc(S.packError)}</div>
     <div class="grow"></div>
     <button class="btn" data-act="packRetry">Retry</button>`; }
   if(!S.packDemo){ return `
     <div style="font:700 17px var(--sans)">Pack reveal</div>
     <div class="grow center" style="gap:14px">
       <div style="width:52px;height:52px;border-radius:15px;border:2px solid #e3c98a;display:flex;align-items:center;justify-content:center;color:var(--gold);font:700 18px var(--mono)">5</div>
       <div class="sub">Opening the five-file pack and staging one recognizer.</div>
     </div>`; }
   const d=S.packDemo;
   const added=JSON.stringify(d.added_recognizer,null,2);
   const caught=(d.after_redactions||[]).find(r=>r.entity==='BENEFIT_ID');
   return `
   <div style="display:flex;align-items:center;justify-content:space-between">
     <div style="font:700 17px var(--sans);letter-spacing:-.01em">Pack reveal</div>
     <span class="pill" style="color:var(--green);background:#e6f0e7;border:1px solid #bfdcc6">NO FORK</span></div>
   <div style="margin-top:12px;display:flex;gap:7px;flex-wrap:wrap">
     ${(d.gates||[]).map(g=>`<span class="pill" style="color:${g.pass?'var(--green)':'var(--red)'};background:${g.pass?'#e6f0e7':'#fff1ed'};border:1px solid ${g.pass?'#bfdcc6':'#e5b2a8'}">${g.pass?'✓':'×'} ${esc(g.name)}</span>`).join('')}</div>
   <div style="flex:1;min-height:0;margin-top:12px;overflow:auto;display:flex;flex-direction:column;gap:10px">
     <div>
       <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em;margin-bottom:5px">ADDED RECOGNIZER</div>
       <div class="code">${esc(added)}</div>
     </div>
     <div>
       <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em;margin-bottom:5px">RE-SCRUBBED NOTE</div>
       <div style="background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px;font:500 13px/1.55 var(--sans)">${esc(d.scrubbed_text)}</div>
     </div>
     <div style="display:flex;align-items:center;justify-content:space-between;background:${caught?'#e6f0e7':'#fff1ed'};border:1.5px solid ${caught?'#bfdcc6':'#e5b2a8'};border-radius:12px;padding:12px">
       <div><div class="mono" style="font-size:10px;color:#6f806f">NEW IDENTIFIER</div>
       <div style="font:700 14px var(--sans);margin-top:4px">${caught?esc(caught.text):'not caught'}</div></div>
       <div class="mono" style="font:800 18px var(--mono);color:${caught?'var(--green)':'var(--red)'}">${caught?'CAUGHT':'BLOCK'}</div>
     </div>
   </div>
   <button class="btn" data-act="backRecord" style="margin-top:12px">Back to record</button>`; },
};

// ---------- helpers ----------
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setDark(on,green){ $phone.classList.toggle('dark',!!on); $phone.classList.toggle('green',!!green); }
function go(name){ S.screen=name; render(); }

function render(){
  $screen.innerHTML = screens[S.screen]();
  $screen.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',onAct));
}

async function onAct(e){
  const act = e.currentTarget.getAttribute('data-act');
  if(act==='toggle'){ S.airplane=!S.airplane; if(S.screen==='held' && !S.airplane){ go('flush'); return doSend(); } return render(); }
  if(act==='sample'){ S.note=NOTE; return render(); }
  if(act==='scrub'){
    if(!S.note.trim()){ alert('Dictate or type a note first — or tap “Use a sample note”.'); return; }
    go('scrubbing'); return doScrub();
  }
  if(act==='retry'){ go('scrubbing'); return doScrub(); }
  if(act==='back') return go('capturing');
  if(act==='gate') return go('gated');
  if(act==='record') return go('record');
  if(act==='send') return go(S.airplane ? 'held' : 'flush');
  if(act==='slack') return showSlack();
  if(act==='pack'){ go('pack'); return doPackReveal(); }
  if(act==='packRetry'){ S.packDemo=null; S.packError=null; go('pack'); return doPackReveal(); }
  if(act==='backRecord') return go('delivered');
}

async function doScrub(){
  S.result=null; S.error=null;
  if(S.screen==='scrubbing') render();          // show the loading state immediately
  try{
    const res = await fetch('/api/scrub',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:S.note})});
    const data = await res.json().catch(()=>({error:'the scrubber returned '+res.status}));
    if(!res.ok || data.error) throw new Error(data.error || ('the scrubber returned '+res.status));
    S.result = data;
  }catch(err){ S.error = (err && err.message) || 'could not reach the scrubber'; }
  if(S.screen==='scrubbing') render();
}

async function doSend(){
  S.posted=false; S.sendNote='';
  // real Slack post, with a minimum dwell so the flush animation reads
  const post = fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({record:S.result.record})})
    .then(r=>r.json()).catch(()=>({ok:false,error:'could not reach the sink'}));
  const [data] = await Promise.all([post, new Promise(r=>setTimeout(r,1900))]);
  S.posted = !!data.ok; S.sendNote = data.ok ? '' : (data.error||'');
  go('delivered');
}

async function doPackReveal(){
  S.packDemo=null; S.packError=null;
  if(S.screen==='pack') render();
  try{
    const res = await fetch('/api/pack-demo');
    const data = await res.json().catch(()=>({error:'pack endpoint returned '+res.status}));
    if(!res.ok || data.error) throw new Error(data.error || ('pack endpoint returned '+res.status));
    S.packDemo=data;
  }catch(err){ S.packError=(err && err.message)||'could not run the pack reveal'; }
  if(S.screen==='pack') render();
}

function showSlack(){
  const rec=S.result.record;
  const themes=(rec.themes||[]).join(' · ');
  const com=(rec.commitments||[])[0];
  $scard.innerHTML = `
   <div style="background:#3a1f3a;padding:13px 16px;display:flex;align-items:center;gap:10px">
     <div style="display:flex;gap:7px"><span style="width:11px;height:11px;border-radius:50%;background:#ff6159"></span><span style="width:11px;height:11px;border-radius:50%;background:#ffbe2f"></span><span style="width:11px;height:11px;border-radius:50%;background:#2bca44"></span></div>
     <div style="font:700 14px var(--sans);color:#fff;margin-left:6px"># coach-records</div>
     <div class="mono" style="font-size:12px;color:#c5a8c5;margin-left:auto">care team</div></div>
   <div style="padding:20px;background:#fdfcfa">
     <div style="display:flex;gap:12px">
       <div style="width:38px;height:38px;flex:none;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-size:17px">✈</div>
       <div style="flex:1">
         <div style="display:flex;align-items:center;gap:8px"><span style="font:700 14px var(--sans)">Airplane Mode</span>
           <span class="mono" style="font-size:9px;color:#6b6456;background:#efe9da;border-radius:4px;padding:2px 5px">APP</span>
           <span class="mono" style="font-size:11px;color:#a39a86">${clock(true)}</span></div>
         <div style="margin-top:11px;border:1px solid var(--line);border-left:4px solid var(--green);border-radius:10px;background:#fff;padding:15px 16px">
           <div style="font:700 16px var(--sans)">Coach session record</div>
           <div style="display:grid;grid-template-columns:auto 1fr;gap:9px 16px;margin-top:13px;font:500 13px var(--sans)">
             <span class="mono" style="font-size:11px;color:#a39a86">CLIENT</span><span class="mono" style="font-weight:600">${esc(rec.client_pseudonym)}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">THEMES</span><span style="color:#3a352c">${esc(themes)||'—'}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">COMMITMENT</span><span style="color:#3a352c">${esc(com?com.text:'—')} · <span style="color:var(--amber);font-weight:600">open</span></span>
             <span class="mono" style="font-size:11px;color:#a39a86">NEXT TOUCH</span><span class="mono">${esc(rec.next_touch||'—')}</span>
           </div>
           <div class="mono" style="display:flex;align-items:center;gap:8px;margin-top:15px;border-top:1px solid #f0eadd;padding-top:11px;font-size:10px;color:#8aa692">
             <span style="color:var(--green)">✓</span> de-identified · gate-clean · ${S.posted?'posted from the edge':'ready to post'}</div>
         </div>
         <div style="margin-top:14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap">
           <span style="font:700 13px var(--sans);color:var(--red)">↑ No name. No member ID.</span>
           <span style="font:500 12px var(--sans);color:#9a7a6e">Not redacted out — never structured in.</span></div>
       </div></div>
     <div class="mono" style="font-size:10px;color:#a39a86;text-align:center;margin-top:16px">${S.posted?'✓ posted to #coach-records — open Slack to evaluate':'preview · set SLACK_WEBHOOK_URL to post for real'}</div>
     <button class="btn" data-act="close" onclick="document.getElementById('slack').style.display='none'" style="margin-top:12px;background:var(--ink)">Close</button>
   </div>`;
  $slack.style.display='flex';
}
$slack.addEventListener('click',e=>{ if(e.target===$slack) $slack.style.display='none'; });

render();
</script>
</body>
</html>
