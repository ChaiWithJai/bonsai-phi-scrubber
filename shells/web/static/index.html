<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16120e">
<title>Airplane Mode</title>
<style>
  :root{
    --bg:#e7e3d8; --paper:#f5f1e8; --card:#fcfaf4; --ink:#221f19; --mut:#6b6456;
    --line:#ece4d4; --gold:#b87814; --gold2:#c6912f; --green:#1f7a4d; --green2:#4fd08c;
    --red:#bf3b2b; --amber:#8a5a0f;
    --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
    --mono:'SF Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  @keyframes sweep{0%{top:-12%;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:104%;opacity:0}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  @keyframes flow{to{background-position:18px 0}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(54,194,129,0)}50%{box-shadow:0 0 30px 1px rgba(54,194,129,.4)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{opacity:0;transform:translateY(6px) scale(.96)}100%{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 18px 34px -20px rgba(184,120,20,.6)}50%{transform:scale(1.025);box-shadow:0 22px 44px -18px rgba(184,120,20,.8)}}

  /* device: FULL-BLEED on real phones (the phone is the frame); a device frame only
     on desktop pointers. */
  #phone{position:relative;width:100vw;height:100vh;height:100dvh;background:var(--paper);
    display:flex;flex-direction:column;overflow:hidden;
    padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
  #notch{display:none;position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:150px;height:26px;background:#0c0b09;border-radius:0 0 20px 20px;z-index:30}
  @media (min-width:600px) and (pointer:fine){
    #phone{width:400px;height:780px;max-height:94vh;border-radius:46px;padding:0;
      box-shadow:0 40px 80px -30px rgba(35,25,10,.6), inset 0 0 0 2px rgba(255,255,255,.06), 0 0 0 11px #1c1813}
    #notch{display:block}
  }
  .dark{background:var(--paper)}
  #phone.dark{background:radial-gradient(120% 80% at 50% 0%,#1a1712,#0e0c0a)}
  #phone.dark.green{background:radial-gradient(120% 75% at 50% 100%,#12231a,#0a0d0b)}

  .screen{flex:1;min-height:0;display:flex;flex-direction:column;padding:20px 24px 24px;overflow:hidden;animation:pop .35s ease}

  h1{font:800 40px/.97 var(--sans);letter-spacing:-.03em;margin:0}
  .kicker{font:500 12px/1 var(--mono);letter-spacing:.07em;color:#a39a86}
  .sub{font:400 14px/1.5 var(--sans);color:var(--mut)}
  .btn{background:var(--ink);color:var(--paper);font:700 15px var(--sans);padding:16px;border-radius:15px;
    text-align:center;border:none;width:100%;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .toggle{display:flex;align-items:center;justify-content:space-between;border:1.5px solid #e6dfd0;
    background:var(--card);border-radius:15px;padding:12px 14px;cursor:pointer}
  .sw{width:44px;height:26px;border-radius:13px;position:relative;transition:background .25s}
  .sw b{position:absolute;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;
    box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .25s,right .25s}
  .sw.on{background:var(--gold)} .sw.on b{right:3px} .sw.off{background:#2f6f4c} .sw.off b{left:3px}
  .note{background:var(--card);border:1.5px solid #ece4d4;border-radius:16px;padding:16px;
    font:400 14.5px/1.65 var(--sans);color:#3a352c;flex:1;min-height:0;overflow:auto;width:100%;resize:none;outline:none}
  .note:focus{border-color:#c6912f;box-shadow:0 0 0 3px rgba(198,145,47,.16)}
  .chip{font:600 11px var(--sans);color:#3a352c;background:#efe9da;border-radius:8px;padding:5px 9px;display:inline-block}
  .pill{font:600 9px/1 var(--mono);border-radius:20px;padding:4px 8px;display:inline-flex;align-items:center;gap:4px}
  .code{font:500 10.5px/1.55 var(--mono);white-space:pre-wrap;word-break:break-word;color:#4f493f;background:#f7f1e5;border:1px solid var(--line);border-radius:10px;padding:10px}
  .micbtn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;border:0;border-radius:18px;
    padding:17px 18px;background:linear-gradient(180deg,#c6912f,#a86610);color:#fff;cursor:pointer;
    font:800 16px var(--sans);box-shadow:0 18px 34px -20px rgba(184,120,20,.72)}
  .micbtn.listening{animation:pulse 1.25s ease-in-out infinite;background:linear-gradient(180deg,#1f7a4d,#155f3a)}
  .micorb{width:33px;height:33px;border-radius:50%;background:rgba(255,255,255,.18);display:inline-flex;align-items:center;justify-content:center;font-size:17px}
  .captureTop{display:flex;align-items:center;gap:10px;margin-top:4px}
  .brandMark{width:28px;height:28px;border-radius:9px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-size:14px;flex:none}
  .captureHero{margin-top:14px;background:linear-gradient(180deg,#fffaf0,#f4ead7);border:1.5px solid #eadfca;border-radius:20px;padding:16px 16px 15px;box-shadow:0 18px 44px -36px rgba(80,55,18,.45)}
  .captureHero h1{font-size:34px;line-height:.95;letter-spacing:0;margin-top:8px}
  .sinkLine{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:13px;border-top:1px solid #eadfca;padding-top:11px}
  .sinkBadges{display:flex;align-items:center;gap:5px;flex:none}
  .sinkState{font:700 10px var(--mono);letter-spacing:0;border-radius:999px;padding:5px 8px;border:1px solid}
  .jobbar{border:1px solid #eadfca;background:#fffaf0;border-radius:12px;padding:8px 10px;margin-bottom:10px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;font:700 10px var(--mono);color:#736c5d}
  .jobbar b{font:800 10px var(--mono);color:var(--green);letter-spacing:0}
  .jobbar.fail b{color:var(--red)}
  .jobbar.run b{color:var(--amber)}
  .sampleBtn{font:700 12px var(--sans);color:var(--gold);background:#f6ecd6;border:1px solid #e3c98a;border-radius:999px;padding:8px 11px;cursor:pointer}
  .noteMeta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .btn.disabled{background:#d9d0bd;color:#8a8273;cursor:default;box-shadow:none}
  .mono{font-family:var(--mono)}
  .grow{flex:1;min-height:0}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  /* dark proof-beat bits */
  .dbox{background:rgba(255,255,255,.02);border:1px solid #2a2620;border-radius:16px;min-height:0}
  .swband{position:absolute;left:0;right:0;height:34px;border-bottom:1.5px solid rgba(54,194,129,.65);
    background:linear-gradient(180deg,rgba(54,194,129,0),rgba(54,194,129,.16) 60%,rgba(54,194,129,.42));
    animation:sweep 2.4s cubic-bezier(.5,0,.5,1) infinite;z-index:2}
  /* slack overlay */
  #slack{position:absolute;inset:0;background:rgba(20,14,6,.55);z-index:40;display:none;
    align-items:center;justify-content:center;padding:18px;animation:pop .3s ease}
  .scard{background:#fff;border-radius:16px;overflow:hidden;width:100%;max-width:380px;
    box-shadow:0 34px 60px -28px rgba(40,30,10,.5);border:1px solid #e2dac9}
</style>
</head>
<body>
<div id="phone">
  <div id="notch"></div>
  <div id="screen" class="screen"></div>
</div>

<div id="slack"><div class="scard" id="scard"></div></div>

<script>
const NOTE = "Met with Maria Alvarez (CM-204815) at her place Tuesday. She's the one whose daughter just started college. Committed to a 10-min morning walk daily.";
const STEPS = new Set(['capturing','scrubbing','gated','record','flush','delivered','pack']);
const RESULT_STEPS = new Set(['gated','record','flush','delivered','pack']);
const DRAFT_KEY = 'airplane-demo-draft-v2';
const OUTBOX_KEY = 'airplane-demo-send-outbox-v1';
const S = { screen:'capturing', note:'', result:null, error:null, posted:false, sendNote:'', sendQueued:false, trajectoryCount:0, trajectoryNote:'', packDemo:null, packError:null, listening:false, speechMsg:'', status:null, job:null };
let recognizer = null;

const $phone = document.getElementById('phone');
const $screen = document.getElementById('screen');
const $slack = document.getElementById('slack');
const $scard = document.getElementById('scard');

// real time for the Slack message preview (this runs in the phone's browser)
function clock(ampm){
  const d=new Date(); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0');
  const ap=h<12?'AM':'PM'; h=h%12||12;
  return ampm ? `${h}:${m} ${ap}` : `${h}:${m}`;
}

// ---------- screens ----------
const screens = {
 capturing(){ setDark(false);
   const hasNote = !!S.note.trim();
   const slackConfigured = S.status&&S.status.slack&&S.status.slack.configured;
   const slackRoute = S.status&&S.status.slack?`${S.status.slack.route} -> ${S.status.slack.channel||'#coach-records'}`:'checking sink';
   const modelReachable = !!(S.status&&S.status.model&&S.status.model.reachable);
   const canSpeech = !!speechRecognitionCtor();
   const dictLabel = S.listening ? 'Listening…' : (canSpeech ? 'Start dictation' : 'Use keyboard mic');
   return `
   <div class="captureTop">
     <div class="brandMark">✈</div>
     <div style="font:700 15px var(--sans);letter-spacing:0">New session</div>
     <span class="pill" style="margin-left:auto;color:var(--amber);background:#f6ecd6;border:1px solid #e3c98a">local</span></div>
   <div class="captureHero">
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.08em">CAPTURE</div>
     <h1>Dictate the session</h1>
     <button class="micbtn ${S.listening?'listening':''}" data-act="dictate" style="margin-top:13px">
       <span class="micorb">${S.listening?'■':'🎙'}</span><span>${dictLabel}</span>
     </button>
     <div class="sinkLine">
       <div id="captureMsg" class="mono" style="font-size:10px;color:${S.speechMsg?'var(--amber)':'#a39a86'}">${esc(S.speechMsg||'edge capture · verifier gated')}</div>
       <div class="sinkBadges">
         <span class="sinkState" style="color:${modelReachable?'var(--green)':'var(--amber)'};background:${modelReachable?'#e6f0e7':'#f6ecd6'};border-color:${modelReachable?'#bfdcc6':'#e3c98a'}">model ${modelReachable?'ready':'off'}</span>
         <span class="sinkState" style="color:${slackConfigured?'var(--green)':'var(--amber)'};background:${slackConfigured?'#e6f0e7':'#f6ecd6'};border-color:${slackConfigured?'#bfdcc6':'#e3c98a'}">Slack ${slackConfigured?'live':'preview'}</span>
       </div>
     </div>
     <div class="mono" style="margin-top:7px;font-size:9px;color:#a39a86;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(slackRoute)}</div>
   </div>
   <textarea id="noteInput" class="note" style="margin-top:12px" placeholder="Session note appears here…" oninput="handleNoteInput(this.value)">${esc(S.note)}</textarea>
   <div class="noteMeta">
     <button data-act="sample" class="sampleBtn">Use sample note</button>
     <span id="wordCount" class="mono" style="font-size:10px;color:#8a8273">${S.note.trim()?S.note.trim().split(/\s+/).length:0} words</span></div>
   <div class="grow"></div>
   <button class="btn ${hasNote?'':'disabled'}" data-act="scrub">${hasNote?'Scrub on device':'Waiting for note'}</button>`; },

 scrubbing(){ setDark(true,false);
   // error state
   if(S.error){ return `
     <div style="font:700 18px var(--sans);color:#f3eee2">Couldn't scrub</div>
     <div class="dbox" style="margin-top:15px;padding:16px;border-color:#5c2e27;color:#cdb1a8;font:400 13.5px/1.6 var(--sans)">
       ${esc(S.error)}
       <div class="mono" style="font-size:11px;color:#8c8475;margin-top:12px">The model server must be running on the laptop:<br>./scripts/serve-model.sh</div></div>
     <div class="grow"></div>
     <button class="btn" data-act="retry" style="background:var(--red);margin-bottom:12px">Try again</button>
     <span data-act="back" class="mono" style="font-size:12px;color:#8c8475;text-align:center;cursor:pointer">← back to the note</span>`; }
   const r = S.result;
   // loading state — the REAL note, under the sweep
   if(!r){ return `
     <div style="font:700 18px var(--sans);color:#f3eee2;letter-spacing:-.01em">Scrubbing</div>
     <div style="display:flex;align-items:center;gap:8px;margin-top:9px">
       <span class="mono" style="font-size:11px;color:#8c8475">rules ∪ Bonsai 1.7B</span>
       <span class="pill" style="color:#9bd9b3;border:1px solid #2c4a38;background:rgba(54,194,129,.08)">ON-DEVICE</span></div>
     <div class="dbox" style="position:relative;flex:1;margin-top:15px;padding:16px;overflow:hidden;font:400 14px/1.8 var(--sans);color:#6f685b">
       <div class="swband"></div>${esc(S.note)}</div>
     <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;border-top:1px solid #2a2620;padding-top:14px">
       <span class="mono" style="font-size:11px;color:#8c8475">running locally · a few seconds</span>
       <span class="mono" style="font-size:11px;color:#d09a3a;display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#d09a3a;animation:blink 1s infinite"></span>working</span></div>`; }
   // result — the REAL scrubbed text + the categories caught
   const ents=[...new Set(r.redactions.map(x=>x.entity))];
   return `
   <div style="font:700 18px var(--sans);color:#f3eee2;letter-spacing:-.01em">Caught ${r.redactions.length}</div>
   <div class="mono" style="font-size:11px;color:#8c8475;margin-top:9px">rules ∪ Bonsai 1.7B · on device</div>
   <div class="dbox" style="flex:1;margin-top:15px;padding:16px;overflow:auto;font:400 14px/1.9 var(--sans);color:#cfc7b6">${esc(r.scrubbed_text)}</div>
   <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">
     ${ents.slice(0,6).map(e=>`<span style="font:700 9px var(--mono);color:#f3927f;background:rgba(191,59,43,.16);border:1px solid #5c2e27;border-radius:5px;padding:4px 7px">${esc(e)}</span>`).join('')}</div>
   <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:14px;border-top:1px solid #2a2620;padding-top:14px">
     <span class="mono" style="font-size:12px;color:#5fe09a;cursor:pointer" data-act="gate">continue →</span></div>`; },

 gated(){ setDark(true,true);
   const r=S.result; const pass = r.gate_pass; const resid = r.residual_count;
   const ents=[...new Set(r.redactions.map(x=>x.entity))].slice(0,5);
   return `
   <div style="font:700 18px var(--sans);color:#eef4ee;letter-spacing:-.01em">Verifier gate</div>
   <div class="mono" style="font-size:11px;color:#7e8a80;margin-top:9px;letter-spacing:.02em">re-scan · default-deny egress</div>
   <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px" class="mono">
     ${ents.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#bfc8be">
        <span>${esc(e)}</span><span style="color:#4fd08c;display:flex;align-items:center;gap:6px">removed
        <span style="display:inline-flex;width:15px;height:15px;border-radius:50%;background:rgba(79,208,140,.16);align-items:center;justify-content:center;font-size:9px">✓</span></span></div>`).join('')}
   </div>
   <div class="dbox" style="margin-top:18px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:9px;border-color:#1e3026">
     <div class="mono" style="font-size:10px;color:#7e8a80;letter-spacing:.1em">RESIDUAL IDENTIFIERS</div>
     <div class="mono" style="font:700 56px/.9 var(--mono);color:${pass?'#4fd08c':'#f3927f'}">${resid}</div>
     <div style="width:100%;height:8px;background:#16201a;border-radius:5px;overflow:hidden;border:1px solid #21342a">
       <div style="width:100%;height:100%;background:linear-gradient(90deg,${pass?'#1f7a4d,#4fd08c':'#7a1f1f,#d04f4f'})"></div></div>
   </div>
   <div class="grow"></div>
   <div data-act="record" style="border:1.5px solid ${pass?'#2f6f4c':'#5c2e27'};background:rgba(54,194,129,.10);border-radius:14px;padding:14px;text-align:center;cursor:pointer;${pass?'animation:glow 2.4s ease-in-out infinite':''}">
     <div style="font:700 15px var(--sans);color:${pass?'#5fe09a':'#f3927f'};letter-spacing:.01em">${pass?'EGRESS UNLOCKED':'EGRESS BLOCKED'}</div>
     <div class="mono" style="font-size:10px;color:#8fb6a0;margin-top:6px">0 residual or no egress · Const. IX</div>
   </div>`; },

 record(){ setDark(false);
   const rec=S.result.record;
   const themes=(rec.themes||[]);
   const coms=(rec.commitments||[]);
   const follow=(rec.follow_ups||[]);
   const risks=(rec.risk_flags||[]);
   const signal=(rec.autonomy_delta&&rec.autonomy_delta.signals||[]).join(' · ');
   return `
   <div style="display:flex;align-items:center;justify-content:space-between">
     <div style="font:700 17px var(--sans);letter-spacing:-.01em">Care record</div>
     <span class="pill" style="color:var(--green);background:#e6f0e7;border:1px solid #bfdcc6">✓ CLEAN</span></div>
   <div style="flex:1;min-height:0;margin-top:14px;background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;overflow:auto">
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">CLIENT_PSEUDONYM</div>
     <div class="mono" style="font:700 19px var(--mono);margin-top:6px">${esc(rec.client_pseudonym||'CLIENT-—')}</div>
     ${themes.length ? `<div style="height:1px;background:var(--line);margin:14px 0"></div>
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">THEMES</div>
     <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${themes.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>` : ''}
     <div style="height:1px;background:var(--line);margin:14px 0"></div>
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">COMMITMENTS</div>
     ${coms.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:9px">
        <span style="font:500 13px var(--sans)">${esc(c.text||c)}</span>
        <span class="mono" style="font-size:9px;font-weight:700;color:var(--amber);background:#f6ecd6;border-radius:5px;padding:3px 7px">${esc((c.status||'open').toUpperCase())}</span></div>`).join('')||'<div class="sub" style="margin-top:8px">—</div>'}
     <div style="height:1px;background:var(--line);margin:14px 0"></div>
     <div class="mono" style="font-size:10px;color:#a39a86;letter-spacing:.05em">FOLLOW_UP</div>
     <div style="font:500 13px/1.45 var(--sans);margin-top:8px;color:#3a352c">${esc(follow[0]||'—')}</div>
     ${signal?`<div class="mono" style="font-size:9px;color:#7a8b73;margin-top:7px">reward: ${esc(signal)}</div>`:''}
     <div style="height:1px;background:var(--line);margin:13px 0"></div>
     <div style="display:flex;gap:18px">
       <div><div class="mono" style="font-size:10px;color:#a39a86">RISK_FLAGS</div><div style="font:600 13px var(--sans);color:${risks.length?'var(--red)':'#5b8068'};margin-top:6px">${esc(risks.join(' · ')||'none')}</div></div>
       <div><div class="mono" style="font-size:10px;color:#a39a86">NEXT_TOUCH</div><div class="mono" style="font:600 13px var(--mono);margin-top:6px">${esc(rec.next_touch||'—')}</div></div>
     </div>
   </div>
   <div class="mono" style="display:flex;align-items:center;gap:7px;margin-top:12px;font-size:11px;font-weight:600;color:var(--amber)">
     <span style="font-size:13px">→</span>gate-clean · ready for Slack sink</div>
   <button class="btn" data-act="send" style="margin-top:11px">Send to #coach-records</button>`; },

 flush(){ setDark(true,true); return `
   <div style="font:700 18px var(--sans);color:#eef4ee;letter-spacing:-.01em">Sending to Slack</div>
   ${ '' }
   <div style="display:flex;align-items:center;justify-content:space-between;border:1px solid #243029;background:rgba(255,255,255,.02);border-radius:14px;padding:12px 14px;margin-top:15px">
     <div style="display:flex;align-items:center;gap:10px"><span style="color:#8c8475;font-size:15px">→</span><span style="font:600 13px var(--sans);color:#cfd6cd">Slack sink</span></div>
     <span class="pill" style="color:#9bd9b3;border:1px solid #2c4a38;background:rgba(54,194,129,.08)">VERIFYING</span></div>
   <div class="grow center" style="gap:20px">
     <div style="position:relative;width:78px;height:78px;display:flex;align-items:center;justify-content:center">
       <div style="position:absolute;inset:0;border-radius:50%;border:3px solid #1b2c22"></div>

// ---------- helpers ----------
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setDark(on,green){ $phone.classList.toggle('dark',!!on); $phone.classList.toggle('green',!!green); }

function sanitizeResultForDraft(r){
  if(!r) return null;
  return {
    scrubbed_text:r.scrubbed_text||'',
    gate_pass:!!r.gate_pass,
    residual_count:r.residual_count||0,
    record:r.record||null,
    redactions:(r.redactions||[]).map(x=>({entity:x.entity||'OTHER',layer:x.layer||'unknown',text:'[held locally]'}))
  };
}

function saveDraft(){
  try{
    sessionStorage.setItem(DRAFT_KEY, JSON.stringify({
      note:S.note,
      result:sanitizeResultForDraft(S.result),
      posted:S.posted,
      sendNote:S.sendNote,
      sendQueued:S.sendQueued,
      trajectoryCount:S.trajectoryCount,
      trajectoryNote:S.trajectoryNote
    }));
  }catch(_){}
}

function loadDraft(){
  try{
    const raw=sessionStorage.getItem(DRAFT_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    S.note=d.note||'';
    S.result=d.result||null;
    S.posted=!!d.posted;
    S.sendNote=d.sendNote||'';
    S.sendQueued=!!d.sendQueued;
    S.trajectoryCount=d.trajectoryCount||0;
    S.trajectoryNote=d.trajectoryNote||'';
  }catch(_){}
}

function routeStep(){
  const step=new URLSearchParams(location.search).get('step')||'capturing';
  if(!STEPS.has(step)) return 'capturing';
  if(RESULT_STEPS.has(step) && !S.result) return 'capturing';
  if(step==='flush') return S.result ? 'record' : 'capturing';
  return step;
}

function writeRoute(step, replace){
  const url=new URL(location.href);
  if(step==='capturing') url.searchParams.delete('step');
  else url.searchParams.set('step', step);
  const next=url.pathname+url.search+url.hash;
  if(next !== location.pathname+location.search+location.hash){
    history[replace?'replaceState':'pushState']({step},'',next);
  }
}

function go(name, opts={}){
  if(!STEPS.has(name)) name='capturing';
  if(RESULT_STEPS.has(name) && !S.result) name='capturing';
  S.screen=name;
  writeRoute(name, !!opts.replace);
  saveDraft();
  render();
}

function setJob(kind,status,detail){
  const now=Date.now();
  S.job={id:(S.job&&S.job.kind===kind)?S.job.id:`${kind}-${now}`,kind,status,detail:detail||'',startedAt:(S.job&&S.job.kind===kind)?S.job.startedAt:now,updatedAt:now};
  render();
}

function clearJobSoon(){
  setTimeout(()=>{ if(S.job && S.job.status!=='running' && S.job.status!=='retrying'){ S.job=null; render(); } }, 2600);
}

function jobHtml(){
  if(!S.job) return '';
  const age=Math.max(0,Math.round((Date.now()-S.job.startedAt)/1000));
  const cls=S.job.status==='failed'?'fail':(S.job.status==='running'||S.job.status==='retrying'?'run':'');
  const edge=S.status&&S.status.slack?`${S.status.slack.route} · model ${S.status.model&&S.status.model.reachable?'ready':'off'}`:'checking edge';
  return `<div class="jobbar ${cls}"><span>${esc(S.job.kind)} · ${esc(S.job.detail||edge)}</span><b>${esc(S.job.status)} · ${age}s</b></div>`;
}

function pendingSend(){
  try{
    const raw=localStorage.getItem(OUTBOX_KEY);
    if(!raw) return null;
    const item=JSON.parse(raw);
    if(!item || !item.send_id || !item.record) return null;
    return item;
  }catch(_){ return null; }
}

function savePendingSend(item){
  try{ localStorage.setItem(OUTBOX_KEY, JSON.stringify(item)); }catch(_){}
}

function clearPendingSend(sendId){
  const item=pendingSend();
  if(!item || !sendId || item.send_id===sendId){
    try{ localStorage.removeItem(OUTBOX_KEY); }catch(_){}
  }
}

async function edgeReachable(){
  return fetch('/api/health',{cache:'no-store'}).then(r=>r.ok).catch(()=>false);
}

function sendPost(item){
  return fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({record:item.record,send_id:item.send_id})})
    .then(async r=>{
      const data = await r.json().catch(()=>({ok:false,error:`edge returned non-JSON from /api/send (${r.status})`}));
      if(!r.ok && !data.error) data.error = `edge rejected /api/send (${r.status})`;
      return data;
    });
}

async function sendWithReplay(item){
  try{
    return await sendPost(item);
  }catch(_){
    const edge = await edgeReachable();
    if(edge){
      await new Promise(r=>setTimeout(r,350));
      try{ return await sendPost(item); }catch(_){}
      return {ok:false,error:'edge is reachable, but /api/send was interrupted before Slack acknowledged after retry'};
    }
    return {ok:false,error:`phone lost connection to edge server at ${location.host}`, queued:true};
  }
}

async function storeTrajectory(record, detail){
  setJob('trajectory','running',detail||'Slack accepted');
  const traj = await fetch('/api/trajectory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({record})})
    .then(r=>r.json()).catch(()=>({ok:false,error:'trajectory store unavailable'}));
  if(traj.ok){ S.trajectoryCount = traj.count; S.trajectoryNote = 'trajectory stored · gate-clean'; setJob('trajectory','complete',`stored #${traj.count}`); }
  else { S.trajectoryNote = traj.error || 'trajectory not stored'; setJob('trajectory','failed',S.trajectoryNote); }
}

async function finishAcceptedSend(item, data){
  clearPendingSend(item.send_id);
  S.posted=true; S.sendQueued=false; S.sendNote='';
  if(!S.result) S.result={record:item.record,redactions:[],gate_pass:true,residual_count:0,scrubbed_text:''};
  await storeTrajectory(item.record, data&&data.deduped?'Slack ack replayed':'Slack accepted');
  saveDraft();
  clearJobSoon();
  if(S.screen==='flush' || S.screen==='record') go('delivered');
  else render();
}

async function replayPendingSend(reason){
  const item=pendingSend();
  if(!item || (S.job && (S.job.status==='running'||S.job.status==='retrying'))) return false;
  if(!await edgeReachable()) return false;
  setJob('send','retrying',reason||'replaying queued clean record');
  if(!S.result) S.result={record:item.record,redactions:[],gate_pass:true,residual_count:0,scrubbed_text:''};
  const data=await sendWithReplay(item);
  if(data.ok){ await finishAcceptedSend(item,data); return true; }
  S.posted=false; S.sendQueued=true; S.sendNote=data.error||'clean record queued locally; waiting for edge';
  S.trajectoryNote='trajectory pending · Slack send queued';
  setJob('send','queued',S.sendNote);
  saveDraft();
  return false;
}

function render(){
  $screen.innerHTML = jobHtml() + screens[S.screen]();
  $screen.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',onAct));
}

async function onAct(e){
  const act = e.currentTarget.getAttribute('data-act');
  if(act==='dictate') return toggleDictation();
  if(act==='sample'){ S.note=NOTE; S.speechMsg='sample loaded'; saveDraft(); return render(); }
  if(act==='scrub'){
    if(e.currentTarget.classList.contains('disabled')){ focusNote(); return; }
    if(!S.note.trim()){ alert('Dictate or type a note first — or tap “Use a sample note”.'); return; }
    go('scrubbing'); return doScrub();
  }
  if(act==='retry'){ go('scrubbing'); return doScrub(); }
  if(act==='back') return go('capturing');
  if(act==='gate') return go('gated');
  if(act==='record') return go('record');
  if(act==='send'){ go('flush'); return doSend(); }
  if(act==='slack') return showSlack();
  if(act==='pack'){ go('pack'); return doPackReveal(); }
  if(act==='packRetry'){ S.packDemo=null; S.packError=null; go('pack'); return doPackReveal(); }
  if(act==='backRecord') return go('delivered');
}

function noteInput(){
  return document.getElementById('noteInput');
}

function updateCaptureControls(){
  const hasNote = !!S.note.trim();
  const wc = document.getElementById('wordCount');
  if(wc) wc.textContent = `${hasNote ? S.note.trim().split(/\s+/).length : 0} words`;
  const cm = document.getElementById('captureMsg');
  if(cm) cm.textContent = S.speechMsg || 'edge capture · verifier gated';
  const scrub = $screen.querySelector('[data-act="scrub"]');
  if(scrub){
    scrub.classList.toggle('disabled', !hasNote);
    scrub.textContent = hasNote ? 'Scrub on device' : 'Waiting for note';
  }
}

function handleNoteInput(value){
  S.note = value;
  saveDraft();
  updateCaptureControls();
}

function speechRecognitionCtor(){
  return window.SpeechRecognition || window.webkitSpeechRecognition;
}

function focusNote(){
  const n=noteInput();
  if(n){ n.focus(); const len=n.value.length; try{ n.setSelectionRange(len,len); }catch(_){} }
}

function setCaptureNote(text, msg){
  S.note = text.trim();
  if(msg) S.speechMsg = msg;
  saveDraft();
  const n = noteInput();
  if(n && S.screen==='capturing'){
    n.value = S.note;
    updateCaptureControls();
  } else {
    render();
  }
}

function toggleDictation(){
  if(S.listening && recognizer){ try{ recognizer.stop(); }catch(_){} S.listening=false; S.speechMsg='dictation stopped'; render(); return; }
  focusNote();
  const SpeechRecognition = speechRecognitionCtor();
  if(!SpeechRecognition){
    S.speechMsg='keyboard mic ready';
    render();
    setTimeout(focusNote,0);
    return;
  }
  recognizer = new SpeechRecognition();
  recognizer.continuous = true;
  recognizer.interimResults = true;
  recognizer.lang = 'en-US';
  let base = S.note.trim();
  let finalTranscript = '';
  recognizer.onstart = ()=>{ S.listening=true; S.speechMsg='capturing voice'; render(); };
  recognizer.onresult = (event)=>{
    let finalText = '', interim = '';
    for(let i=0;i<event.results.length;i++){
      const txt=event.results[i][0].transcript.trim();
      if(event.results[i].isFinal) finalText += (finalText?' ':'') + txt;
      else interim += (interim?' ':'') + txt;
    }
    finalTranscript = finalText;
    setCaptureNote([base, finalTranscript, interim].filter(Boolean).join(' '), 'capturing voice');
  };
  recognizer.onerror = ()=>{ S.listening=false; S.speechMsg='keyboard mic ready'; render(); setTimeout(focusNote,0); };
  recognizer.onend = ()=>{ S.listening=false; if(!S.speechMsg) S.speechMsg='dictation captured'; render(); };
  try{ recognizer.start(); }catch(_){ S.speechMsg='keyboard mic ready'; render(); setTimeout(focusNote,0); }
}

async function doScrub(){
  S.result=null; S.error=null;
  setJob('scrub','running','rules union Bonsai');
  if(S.screen==='scrubbing') render();          // show the loading state immediately
  try{
    const res = await fetch('/api/scrub',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:S.note})});
    const data = await res.json().catch(()=>({error:'the scrubber returned '+res.status}));
    if(!res.ok || data.error) throw new Error(data.error || ('the scrubber returned '+res.status));
    S.result = data;
    setJob('scrub','complete',`${(data.redactions||[]).length} identifiers caught`);
  }catch(err){
    S.error = (err && err.message) || 'could not reach the scrubber';
    setJob('scrub','failed',S.error);
  }
  saveDraft();
  clearJobSoon();
  if(S.screen==='scrubbing') render();
}

async function doSend(){
  S.posted=false; S.sendNote=''; S.sendQueued=false; S.trajectoryNote='';
  setJob('send','running','posting clean record');
  const sendId = (window.crypto&&crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
  const item = {send_id:sendId, record:S.result.record, created_at:new Date().toISOString()};
  savePendingSend(item);
  saveDraft();
  // real Slack post, with a minimum dwell so the flush animation reads
  const post = sendWithReplay(item);
  const [data] = await Promise.all([post, new Promise(r=>setTimeout(r,1900))]);
  S.posted = !!data.ok; S.sendNote = data.ok ? '' : (data.error||'');
  if(data.ok){
    await finishAcceptedSend(item,data);
  } else {
    S.sendQueued=!!data.queued;
    if(S.sendQueued){
      S.sendNote='clean record queued locally; will retry when the edge is reachable';
      S.trajectoryNote='trajectory pending · Slack send queued';
      setJob('send','queued','waiting for edge reconnect');
    } else {
      S.trajectoryNote = 'trajectory not stored · Slack send failed';
      setJob('send','failed',S.sendNote);
    }
  }
  saveDraft();
  clearJobSoon();
  go('delivered');
}

async function doPackReveal(){
  S.packDemo=null; S.packError=null;
  setJob('pack','running','loading declarative pack');
  if(S.screen==='pack') render();
  try{
    const res = await fetch('/api/pack-demo');
    const data = await res.json().catch(()=>({error:'pack endpoint returned '+res.status}));
    if(!res.ok || data.error) throw new Error(data.error || ('pack endpoint returned '+res.status));
    S.packDemo=data;
    setJob('pack','complete','five files verified');
  }catch(err){ S.packError=(err && err.message)||'could not run the pack reveal'; setJob('pack','failed',S.packError); }
  clearJobSoon();
  if(S.screen==='pack') render();
}

  const rec=S.result.record;
  const themes=(rec.themes||[]).join(' · ');
  const com=(rec.commitments||[])[0];
  const follow=(rec.follow_ups||[])[0]||'—';
  const risks=(rec.risk_flags||[]).join(' · ')||'none';
  $scard.innerHTML = `

     <div style="font:700 14px var(--sans);color:#fff;margin-left:6px"># coach-records</div>

           <span class="mono" style="font-size:11px;color:#a39a86">${clock(true)}</span></div>
         <div style="margin-top:11px;border:1px solid var(--line);border-left:4px solid var(--green);border-radius:10px;background:#fff;padding:15px 16px">
           <div style="font:700 16px var(--sans)">Coach session record</div>
           <div style="display:grid;grid-template-columns:auto 1fr;gap:9px 16px;margin-top:13px;font:500 13px var(--sans)">
             <span class="mono" style="font-size:11px;color:#a39a86">CLIENT</span><span class="mono" style="font-weight:600">${esc(rec.client_pseudonym)}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">THEMES</span><span style="color:#3a352c">${esc(themes)||'—'}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">COMMITMENT</span><span style="color:#3a352c">${esc(com?com.text:'—')} · <span style="color:var(--amber);font-weight:600">open</span></span>
             <span class="mono" style="font-size:11px;color:#a39a86">FOLLOW-UP</span><span style="color:#3a352c">${esc(follow)}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">RISK</span><span style="color:${risks==='none'?'#5b8068':'var(--red)'}">${esc(risks)}</span>
             <span class="mono" style="font-size:11px;color:#a39a86">NEXT TOUCH</span><span class="mono">${esc(rec.next_touch||'—')}</span>
           </div>
           <div class="mono" style="display:flex;align-items:center;gap:8px;margin-top:15px;border-top:1px solid #f0eadd;padding-top:11px;font-size:10px;color:#8aa692">
             <span style="color:var(--green)">✓</span> de-identified · gate-clean · ${S.posted?'posted from the edge':'ready to post'}</div>
         </div>
         <div style="margin-top:14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap">
           <span style="font:700 13px var(--sans);color:var(--red)">↑ No name. No member ID.</span>
           <span style="font:500 12px var(--sans);color:#9a7a6e">Not redacted out — never structured in.</span></div>
       </div></div>
     <div class="mono" style="font-size:10px;color:#a39a86;text-align:center;margin-top:16px">${S.posted?'✓ posted to #coach-records — open Slack to evaluate':'preview · set SLACK_WEBHOOK_URL or SLACK_BOT_TOKEN to post for real'}</div>
     <button class="btn" data-act="close" onclick="document.getElementById('slack').style.display='none'" style="margin-top:12px;background:var(--ink)">Close</button>
   </div>`;
  $slack.style.display='flex';
}
$slack.addEventListener('click',e=>{ if(e.target===$slack) $slack.style.display='none'; });

loadDraft();
if(pendingSend()){
  S.sendQueued=true;
  S.sendNote='clean record queued locally; will retry when the edge is reachable';
}
S.screen = routeStep();
writeRoute(S.screen, true);
render();
refreshStatus();
setInterval(refreshStatus, 5000);
setInterval(()=>{ if(S.job && (S.job.status==='running'||S.job.status==='retrying')) render(); }, 1000);
setInterval(()=>{ replayPendingSend('scheduled outbox replay'); }, 3000);
window.addEventListener('online',()=>replayPendingSend('network restored'));
window.addEventListener('focus',()=>replayPendingSend('window focused'));
window.addEventListener('popstate',()=>{ S.screen=routeStep(); render(); });

async function refreshStatus(){
  try{
    const res = await fetch('/api/status');
    const data = await res.json();
    if(data.ok){
      S.status=data;
      replayPendingSend('edge status restored');
      if(S.screen==='capturing' || S.job || S.sendQueued) render();
    }
  }catch(_){}
}
</script>
</body>
</html>
